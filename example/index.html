<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebRTC Client Example</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0a0a0a; color: #e5e5e5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { width: 100%; max-width: 520px; padding: 2rem; }
    h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 1.5rem; color: #fff; }
    .field { margin-bottom: 1rem; }
    label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #888; margin-bottom: 0.35rem; }
    input { width: 100%; padding: 0.6rem 0.75rem; border: 1px solid #2a2a2a; border-radius: 6px; background: #141414; color: #e5e5e5; font-family: monospace; font-size: 0.875rem; outline: none; }
    input:focus { border-color: #3b82f6; }
    .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    button { padding: 0.5rem 1rem; border: none; border-radius: 6px; font-size: 0.8rem; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
    button:disabled { opacity: 0.3; cursor: not-allowed; }
    button:hover:not(:disabled) { opacity: 0.85; }
    .btn-blue { background: #3b82f6; color: #fff; }
    .btn-green { background: #22c55e; color: #fff; }
    .btn-red { background: #ef4444; color: #fff; }
    .status { display: inline-block; padding: 0.25rem 0.6rem; border-radius: 99px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 1rem; }
    .status[data-state="idle"] { background: #1e1e1e; color: #666; }
    .status[data-state="signaling:connecting"] { background: #1e293b; color: #60a5fa; }
    .status[data-state="signaling:connected"] { background: #0f2a1e; color: #4ade80; }
    .status[data-state="peer:connecting"] { background: #2a1e0f; color: #fbbf24; }
    .status[data-state="peer:connected"] { background: #052e16; color: #22c55e; }
    .status[data-state="disconnected"] { background: #1e1e1e; color: #888; }
    .status[data-state="failed"] { background: #2a0f0f; color: #f87171; }
    .log { margin-top: 1rem; padding: 0.75rem; background: #111; border: 1px solid #222; border-radius: 6px; font-family: monospace; font-size: 0.75rem; max-height: 200px; overflow-y: auto; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
    .log .ts { color: #555; }
    .log .info { color: #60a5fa; }
    .log .ok { color: #4ade80; }
    .log .err { color: #f87171; }
  </style>
</head>
<body>
  <div class="container">
    <h1>WebRTC Client</h1>

    <div class="status" id="status" data-state="idle">idle</div>

    <div class="field">
      <label>Signaling Server URL</label>
      <input id="serverUrl" value="http://localhost:3030" />
    </div>

    <div class="actions">
      <button class="btn-blue" id="btnConnect">Connect</button>
      <button class="btn-red" id="btnDisconnect" disabled>Disconnect</button>
    </div>

    <div class="field">
      <label>My Socket ID</label>
      <input id="myId" readonly placeholder="not connected" />
    </div>

    <div class="field">
      <label>Remote Socket ID</label>
      <input id="remoteId" placeholder="paste target socket ID" />
    </div>

    <div class="actions">
      <button class="btn-green" id="btnPeer" disabled>Connect to Peer</button>
      <button class="btn-red" id="btnDropPeer" disabled>Drop Peer</button>
    </div>

    <div class="field">
      <label>Message</label>
      <input id="msgInput" placeholder="type a message…" />
    </div>

    <div class="actions">
      <button class="btn-blue" id="btnSend" disabled>Send</button>
    </div>

    <div class="log" id="log"></div>
  </div>

  <script src="./bundle.js"></script>
</body>
</html>
